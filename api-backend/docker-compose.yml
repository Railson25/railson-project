version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: api_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
